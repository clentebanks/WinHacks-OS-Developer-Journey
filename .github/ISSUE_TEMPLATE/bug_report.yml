name: Bug report
description: Report reproducible incorrect behavior.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
