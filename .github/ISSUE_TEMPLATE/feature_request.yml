name: Feature request
description: Propose a measurable product improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user or engineering problem, not only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Observable result one
        - [ ] Observable result two
    validations:
      required: true
