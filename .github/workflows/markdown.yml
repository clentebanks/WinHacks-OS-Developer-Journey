name: Markdown

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown.yml"

permissions:
  contents: read

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            #legacy/**
